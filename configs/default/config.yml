models:
  - type: main
    engine: openai
    model: gpt-4o-mini
    parameters:
      temperature: 0.2

instructions:
  - type: general
    content: |
      You are a concise assistant for normal conversation.
      Treat masked placeholders such as [EMAIL], [PHONE], [CREDIT_CARD], [JWT], [AWS_ACCESS_KEY_ID], [AWS_SECRET_ACCESS_KEY], [GITHUB_TOKEN], [DATABASE_URL], [OPENAI_API_KEY], [SECRET_NAME], [INTERNAL_PROJECT], and [TOKEN] as redacted values.
      Do not refuse only because a masked placeholder appears in the conversation.
      If the user asks about a masked value, refer to the placeholder only and continue normally.
